<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteFlow</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/script.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Notes navigation">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <i data-lucide="notebook-pen"></i>
        </div>
        <div>
          <p class="eyebrow">Workspace</p>
          <h1>NoteFlow</h1>
        </div>
      </div>

      <button class="primary-action" id="newNoteBtn" type="button">
        <i data-lucide="plus"></i>
        <span>New note</span>
      </button>

      <nav class="filter-list" aria-label="Note filters">
        <button class="filter-button is-active" type="button" data-filter="all">
          <i data-lucide="inbox"></i>
          <span>All notes</span>
          <strong id="allCount">0</strong>
        </button>
        <button class="filter-button" type="button" data-filter="pinned">
          <i data-lucide="pin"></i>
          <span>Pinned</span>
          <strong id="pinnedCount">0</strong>
        </button>
        <button class="filter-button" type="button" data-filter="archived">
          <i data-lucide="archive"></i>
          <span>Archive</span>
          <strong id="archivedCount">0</strong>
        </button>
      </nav>

      <section class="tag-panel" aria-label="Tags">
        <div class="panel-heading">
          <i data-lucide="tags"></i>
          <h2>Tags</h2>
        </div>
        <div class="tag-list" id="tagList"></div>
      </section>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <label class="search-box" for="searchInput">
          <i data-lucide="search"></i>
          <input id="searchInput" type="search" placeholder="Search notes" autocomplete="off" />
        </label>
        <div class="topbar-actions">
          <p class="status-text" id="statusText">Ready</p>
          <div class="account-menu" id="accountMenu" hidden>
            <span id="userName"></span>
            <button class="secondary-action compact" id="logoutButton" type="button">
              <i data-lucide="log-out"></i>
              <span>Sign out</span>
            </button>
          </div>
        </div>
      </header>

      <section class="auth-panel" id="authPanel" aria-label="Sign in">
        <div class="auth-card">
          <div class="auth-mark" aria-hidden="true">
            <i data-lucide="shield-check"></i>
          </div>
          <p class="eyebrow">Sign in</p>
          <h2>NoteFlow</h2>
          <div class="auth-actions">
            <button class="provider-action google" id="googleLoginButton" type="button">
              <span class="provider-mark" aria-hidden="true">G</span>
              <span>Continue with Google</span>
            </button>
            <button class="provider-action facebook" id="facebookLoginButton" type="button">
              <span class="provider-mark" aria-hidden="true">f</span>
              <span>Continue with Facebook</span>
            </button>
          </div>
        </div>
      </section>

      <div class="workspace" id="workspace" hidden>
        <section class="notes-column" aria-label="Notes">
          <div class="section-title">
            <div>
              <p class="eyebrow" id="filterLabel">All notes</p>
              <h2 id="listHeading">Notes</h2>
            </div>
            <span class="count-pill" id="visibleCount">0</span>
          </div>

          <div class="notes-list" id="notesList"></div>
        </section>

        <section class="editor-column" aria-label="Note editor">
          <form class="editor" id="noteForm">
            <div class="editor-toolbar">
              <div>
                <p class="eyebrow" id="editorMode">New note</p>
                <h2 id="editorHeading">Capture something useful</h2>
              </div>

              <div class="tool-buttons">
                <button class="icon-button" id="pinButton" type="button" title="Pin note" aria-label="Pin note" disabled>
                  <i data-lucide="pin"></i>
                </button>
                <button class="icon-button" id="archiveButton" type="button" title="Archive note" aria-label="Archive note" disabled>
                  <i data-lucide="archive"></i>
                </button>
                <button class="icon-button danger" id="deleteButton" type="button" title="Delete note" aria-label="Delete note" disabled>
                  <i data-lucide="trash-2"></i>
                </button>
              </div>
            </div>

            <label class="field-label" for="titleInput">Title</label>
            <input id="titleInput" name="title" type="text" placeholder="Untitled note" autocomplete="off" />

            <div class="form-grid">
              <div>
                <label class="field-label" for="categoryInput">Category</label>
                <input id="categoryInput" name="category" type="text" placeholder="General" autocomplete="off" />
              </div>

              <div>
                <label class="field-label" for="tagsInput">Tags</label>
                <input id="tagsInput" name="tags" type="text" placeholder="work, ideas" autocomplete="off" />
              </div>
            </div>

            <label class="field-label" for="contentInput">Content</label>
            <textarea id="contentInput" name="content" placeholder="Start writing..."></textarea>

            <div class="editor-actions">
              <button class="secondary-action" id="clearButton" type="button">
                <i data-lucide="rotate-ccw"></i>
                <span>Clear</span>
              </button>
              <button class="save-action" type="submit">
                <i data-lucide="save"></i>
                <span id="saveButtonText">Save note</span>
              </button>
            </div>
          </form>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
